name = "financial-cockpit"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Production datastore. Create with: `wrangler r2 bucket create app-financial-cockpit`
# then seed it from local demo data with `python ../scripts/push_to_r2.py`.
[[r2_buckets]]
binding = "DATASETS"
bucket_name = "app-financial-cockpit"

[vars]
# ENV=prod is set as a Worker secret (selects the R2 data path). R2_DATA_PREFIX
# maps datastore-relative keys to R2 object keys (e.g. globals/entities.json ->
# data/globals/entities.json).
R2_DATA_PREFIX = "data"

# Auth secret for prod: `wrangler secret put SESSION_SECRET`
# Demo password for prod:  `wrangler secret put ADMIN_PASSWORD`
