{% raw %}
api:
  title: "ABI API"
  description: "API for ABI"
  logo_path: "assets/logo.png"
  favicon_path: "assets/favicon.ico"
  cors_origins:
    - "http://{{ secret.PUBLIC_WEB_HOST }}"
    - "https://{{ secret.PUBLIC_WEB_HOST }}"
    - "http://{{ secret.PUBLIC_API_HOST }}"
    - "https://{{ secret.PUBLIC_API_HOST }}"

global_config:
  ai_mode: "cloud"
  public_api_host: "{{ secret.PUBLIC_API_HOST }}"

opencode:
  auth_file_path: "~/.local/share/opencode/auth.json"
  providers:
    - id: "openrouter"
      key: "{{ secret.OPENROUTER_API_KEY }}"
      type: "api"
    - id: "openai"
      key: "{{ secret.OPENAI_API_KEY }}"
      type: "api"

modules:
  - module: naas_abi
    enabled: true
    config:
      nexus_config:
        database_url: "sqlite+aiosqlite:///./storage/nexus.db"

  - module: naas_abi_marketplace.ai.chatgpt
    enabled: true
    config:
      openai_api_key: "{{ secret.OPENAI_API_KEY }}"
{% endraw %}
  - module: {{ project_name_snake }}
    enabled: true

default_agent: "{{ project_name_snake }} {{ project_name_pascal }}Agent"

{% raw %}
services:
  secret:
    secret_adapters:
      - adapter: "dotenv"
        config: {}
  object_storage:
    object_storage_adapter:
      adapter: "fs"
      config:
        base_path: "storage/datastore"
  triple_store:
    triple_store_adapter:
      # HTTP-backed adapter so multiple processes (api + dagster + …) can
      # share the store. `abi dev` spawns a local oxigraph server (see
      # naas_abi_core.services.triple_store.oxigraph_server) and injects
      # OXIGRAPH_URL into each consumer's environment, which overrides this.
      adapter: "oxigraph"
      config:
        oxigraph_url: "http://127.0.0.1:7878"
        timeout: 60
  vector_store:
    vector_store_adapter:
      adapter: "qdrant_in_memory"
      config:
        storage_path: "storage/vectorstore/qdrant"
        timeout: 300
  bus:
    bus_adapter:
      adapter: "python_queue"
      config:
        persistence_path: "storage/bus/python_queue.sqlite3"
        journal_mode: "WAL"
        busy_timeout_ms: 5000
        poll_interval_seconds: 0.05
        lock_timeout_seconds: 1.0
  kv:
    kv_adapter:
      adapter: "python"
      config:
        persistence_path: "storage/kv/python.sqlite3"
        journal_mode: "WAL"
        busy_timeout_ms: 5000
{% endraw %}
