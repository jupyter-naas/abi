{% raw %}
api:
  title: "ABI API"
  description: "API for ABI"
  logo_path: "assets/logo.png"
  favicon_path: "assets/favicon.ico"
  cors_origins:
    - "http://{{ secret.PUBLIC_WEB_HOST }}"
    - "https://{{ secret.PUBLIC_WEB_HOST }}"
    - "http://{{ secret.PUBLIC_API_HOST }}"
    - "https://{{ secret.PUBLIC_API_HOST }}"

global_config:
  ai_mode: "cloud"
  public_api_host: "{{ secret.PUBLIC_API_HOST }}"

opencode:
  auth_file_path: "~/.local/share/opencode/auth.json"
  providers:
    - id: "openrouter"
      key: "{{ secret.OPENROUTER_API_KEY }}"
      type: "api"
    - id: "openai"
      key: "{{ secret.OPENAI_API_KEY }}"
      type: "api"

modules:
  - module: naas_abi
    enabled: true
    config:
      nexus_config:
        frontend_url: "https://{{ secret.PUBLIC_WEB_HOST }}"
        database_url: "postgresql+asyncpg://{{ secret.POSTGRES_USER }}:{{ secret.POSTGRES_PASSWORD }}@postgres:5432/nexus"
        feature_flags:
          enabled_features:
            - chat
            - files
            - agents
            - apps
            - marketplace
            - search
            - ontology
            - graph
            - settings
          role_baseline:
            owner: [chat, files, agents, apps, marketplace, search, ontology, graph, settings]
            admin: [chat, files, agents, apps, marketplace, search, ontology, graph, settings]
            member: [chat, files]
            viewer: [chat, files]
          workspace_overrides: {}
        magic_link_allow_signup: false
        magic_link_email_app_name: "ABI Platform"
        magic_link_email_subject_template: "Your {app_name} sign-in link"
        magic_link_email_text_template: "Use this link to sign in to {app_name}:\n\n{magic_link_url}\n\nThis link expires in {expire_minutes} minutes."
        magic_link_email_html_template: "<p>Use this link to sign in to {app_name}:</p><p><a href=\"{magic_link_url}\">Sign in</a></p><p>This link expires in {expire_minutes} minutes.</p>"
        tenant:
          tab_title: "ABI AI Platform"
          primary_color: "#34D399"
          accent_color: "#34D399"
          background_color: "#FFFFFF"
          login_card_color: "#FFFFFF"
          login_input_color: "#F4F4F4"
          login_border_radius: "0"
          show_terms_footer: false
          show_powered_by: false
          login_footer_text: "© ABI AI Platform"
        users:
          - email: "admin@example.com"
            name: "ABI Admin"
        organizations:
          - name: "ABI"
            slug: "abi"
            owner_email: "admin@example.com"
            primary_color: "#34D399"
            accent_color: "#34D399"
            login_footer_text: "© ABI"
            show_powered_by: false
            members:
              - email: "admin@example.com"
                role: "owner"
            workspaces:
              - name: "ABI"
                slug: "abi"
                owner_email: "admin@example.com"
                primary_color: "#34D399"
                accent_color: "#34D399"
                members:
                  - email: "admin@example.com"
                    role: "owner"

  - module: naas_abi_marketplace.ai.chatgpt
    enabled: true
    config:
      openai_api_key: "{{ secret.OPENAI_API_KEY }}"
{% endraw %}
  - module: {{ project_name_snake }}
    enabled: true

default_agent: "{{ project_name_snake }} {{ project_name_pascal }}Agent"

{% raw %}
services:
  secret:
    secret_adapters:
      - adapter: "dotenv"
        config: {}
  object_storage:
    object_storage_adapter:
      adapter: "s3"
      config:
        bucket_name: "abi"
        base_prefix: "abi/datastore"
        access_key_id: "{{ secret.MINIO_ROOT_USER }}"
        secret_access_key: "{{ secret.MINIO_ROOT_PASSWORD }}"
        endpoint_url: "http://minio:9000"
  triple_store:
    triple_store_adapter:
      adapter: "apache_jena_tdb2"
      config:
        jena_tdb2_url: "http://admin:{{ secret.FUSEKI_ADMIN_PASSWORD }}@fuseki:3030/ds"
        key_value_service:
          kv_adapter:
            adapter: "redis"
            config:
              redis_url: "redis://redis:6379"
  vector_store:
    vector_store_adapter:
      adapter: "qdrant"
      config:
        host: "qdrant"
        port: 6333
  bus:
    bus_adapter:
      adapter: "rabbitmq"
      config:
        rabbitmq_url: "amqp://{{ secret.RABBITMQ_USER }}:{{ secret.RABBITMQ_PASSWORD }}@rabbitmq:5672"
  kv:
    kv_adapter:
      adapter: "redis"
      config:
        redis_url: "redis://redis:6379"
  email:
    email_adapter:
      adapter: "filesystem"
      config:
        directory: "storage/email"
{% endraw %}
