{{- if .Values.externalSecrets.enabled -}}
{{- if .Values.externalSecrets.createSecretStore }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: {{ include "abi.namespace" . }}
  annotations:
    eks.amazonaws.com/role-arn: {{ required "externalSecrets.serviceAccountRoleArn is required when createSecretStore=true" .Values.externalSecrets.serviceAccountRoleArn | quote }}
  labels:
    {{- include "abi.commonLabels" . | nindent 4 }}
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ .Values.global.secretStoreName }}
  namespace: {{ include "abi.namespace" . }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.global.awsRegion }}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
{{- end }}
{{- range $logical, $smName := .Values.externalSecrets.secrets }}
{{- if $smName }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: abi-{{ $logical }}
  namespace: {{ include "abi.namespace" $ }}
  labels:
    {{- include "abi.commonLabels" $ | nindent 4 }}
spec:
  refreshInterval: {{ $.Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ $.Values.global.secretStoreName }}
    kind: SecretStore
  target:
    name: abi-{{ $logical }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ $smName | quote }}
{{- end }}
{{- end }}
{{- end }}
