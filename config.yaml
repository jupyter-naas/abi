deploy:
  workspace_id: "96ce7ee7-e5f5-4bca-acf9-9d5d41317f81"
  space_name: "abi-api"
  naas_api_key: "{{ secret.NAAS_API_KEY }}"
  env:
    NAAS_API_KEY: "{{ secret.NAAS_API_KEY }}"
    OPENAI_API_KEY: "{{ secret.OPENAI_API_KEY }}"
    ABI_API_KEY: "{{ secret.ABI_API_KEY }}"

api:
  title: "ABI API"
  description: "API for ABI"
  logo_path: "assets/logo.png"
  favicon_path: "assets/favicon.ico"
  cors_origins:
    - "http://localhost:9879"
    - "http://localhost:3042"

global_config:
  ai_mode: "cloud"
  public_api_host: "{{ secret.NEXUS_API_URL }}"

opencode:
  auth_file_path: "~/.local/share/opencode/auth.json"
  providers:
    - id: "openrouter"
      key: "{{ secret.OPENROUTER_API_KEY }}"
      type: "api"
    - id: "openai"
      key: "{{ secret.OPENAI_API_KEY }}"
      type: "api"

default_agent: naas_abi AbiAgent 
modules:
  - module: naas_abi
    enabled: true
    config:
      nexus_config:
        database_url: "sqlite+aiosqlite:///./storage/nexus.db"
        # Dev convenience: enable password login so the seeded admin user
        # below can actually sign in. The bootstrap password is auto-
        # generated on first boot and written to `.env` as
        # `NEXUS_USER_ADMIN_EXAMPLE_COM_PASSWORD`.
        auth_password_enabled: true
        magic_link_allow_signup: false
        tenant:
          tab_title: "ABI"
          # Social sharing preview - shown when the platform URL is shared in
          # Slack, Twitter/X, iMessage, LinkedIn, etc.
          og_title: "ABI"
          og_description: "Your AI Operating System - agents, knowledge, and data in one place."
          og_image_url: "https://repository-images.githubusercontent.com/704324955/444d3ad8-befb-446f-9723-6453aad2c336"
        marketplace:
          pricing:
            maintenance_standard_usd: 499
            maintenance_early_access_usd: 299
            cta_url: "https://naas.ai/enterprise"
            enterprise_categories: ["domain"]
        users:
          - email: "admin@example.com"
            name: "Dev Admin"
            is_superadmin: true
        organizations:
          - name: "Dev"
            slug: "dev"
            owner_email: "admin@example.com"
            members:
              - email: "admin@example.com"
                role: "owner"
            workspaces:
              - name: "Default"
                slug: "default"
                owner_email: "admin@example.com"
                members:
                  - email: "admin@example.com"
                    role: "owner"
  
  - module: naas_abi_marketplace.ai.chatgpt
    enabled: true
    config:
      openai_api_key: "{{ secret.OPENAI_API_KEY }}"

  - module: naas_abi_marketplace.applications.git
    enabled: true
  
  - module: naas_abi_marketplace.applications.github
    enabled: true
    config:
      github_access_token: "{{ secret.GITHUB_ACCESS_TOKEN }}"

  - module: naas_abi_marketplace.applications.sec_gov
    enabled: true
    config:
      datastore_path: "sec_gov"
      user_agent: "NAAS-ABI-Marketplace/1.0 (abi@naas.ai)"
  
  - module: naas_abi_marketplace.applications.openrouter
    enabled: true
    config:
      openrouter_api_key: "{{ secret.OPENROUTER_API_KEY }}"
      include_models:
        - "anthropic/claude-opus-4.6"
        - "anthropic/claude-sonnet-4.6"
        - "deepseek/deepseek-v3.2"
        - "google/gemini-3.1-pro-preview"
        - "mistralai/mistral-large-2512"
        - "openai/gpt-4.1"
        - "openai/gpt-4.1-mini"
        - "openai/gpt-5.1"
        - "openai/gpt-5.2"
        - "perplexity/sonar-pro-search"
        - "x-ai/grok-4.1-fast"

  - module: naas_abi_marketplace.alpha.wsr
    enabled: true
    config:
      opensky_client_id: "{{ secret.OPENSKY_CLIENT_ID }}"
      opensky_client_secret: "{{ secret.OPENSKY_CLIENT_SECRET }}"
      tfl_app_key: "{{ secret.TFL_APP_KEY }}"
      openwebcamdb_api_key: "{{ secret.OPENWEBCAMDB_API_KEY }}"

  - module: naas_abi_marketplace.domains.document
    enabled: true
    config:
      document_agent:
        model_id: "text-embedding-3-small"
        dimension: 1536
        api_key: "{{ secret.OPENAI_API_KEY }}"
      markdowntovector_pipelines:
        - api_key: "{{ secret.OPENAI_API_KEY }}"

  - module: naas_abi_marketplace.domains.support
    enabled: true
    config:
        default_repository: "jupyter-naas/abi"
        github_project_id: 12
        project_node_id: "PVT_kwDOBESWNM4AKRt3"
        iteration_field_id: "PVTIF_lADOBESWNM4AKRt3zgGZRc4"
        status_field_id: "PVTSSF_lADOBESWNM4AKRt3zgGZRV8"
        status_option_id: "97363483"
        priority_field_id: "PVTSSF_lADOBESWNM4AKRt3zgGac0g"
        priority_option_id: "4fb76f2d"
  
services:
  secret:
    secret_adapters:
      - adapter: "dotenv"
        config: {}
  object_storage:
    object_storage_adapter:
      adapter: "fs"
      config:
        base_path: "storage/datastore"
  triple_store:
    triple_store_adapter:
      # Default to the HTTP-backed oxigraph adapter so multiple processes
      # (api + dagster + …) can share the store concurrently. `abi dev`
      # spawns a local oxigraph server (see naas_abi_core.services
      # .triple_store.oxigraph_server) and injects OXIGRAPH_URL into each
      # consumer's environment, which overrides this value.
      adapter: "oxigraph"
      config:
        oxigraph_url: "http://127.0.0.1:7878"
        timeout: 60
  vector_store:
    # File-backed SQLite + sqlite-vec store. Multi-process safe via WAL,
    # so api and dagster can share it without a server. For prod, switch
    # to the "qdrant" HTTP adapter (see config.local.yaml / config.remote.yaml).
    vector_store_adapter:
      adapter: "sqlite_vec"
      config:
        persistence_path: "storage/vectorstore/vectors.sqlite3"
        journal_mode: "WAL"
        busy_timeout_ms: 5000
  bus:
    bus_adapter:
      adapter: "python_queue"
      config:
        persistence_path: "storage/bus/python_queue.sqlite3"
        journal_mode: "WAL"
        busy_timeout_ms: 5000
  kv:
    kv_adapter:
      adapter: "python"
      config:
        persistence_path: "storage/kv/python.sqlite3"
        journal_mode: "WAL"
        busy_timeout_ms: 5000
  email:
    email_adapter:
      adapter: "filesystem"
      config:
        directory: "storage/email"
  event:
    event_adapter:
      adapter: "sqlite"
      config:
        db_path: "storage/events/events.sqlite"
